<!DOCTYPE html>
<html>
<head>
    <title>Canva Integration Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #333;
        }

        .box {
            background: white;
            padding: 25px;
            margin-top: 20px;
            border-radius: 10px;
            width: 60%;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 12px 18px;
            margin: 10px;
            border: none;
            background: #00c4cc;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #009aa3;
        }

        a {
            display: inline-block;
            margin: 10px;
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h1>🎨 Canva Integration System</h1>

<div class="box">

    <p>Login and manage your Canva designs from here.</p>

    <!-- LOGIN -->
    <button onclick="location.href='/api/canva/login/'">
        🔐 Login with Canva
    </button>

    <!-- DASHBOARD -->
    <button onclick="location.href='/api/canva/dashboard/'">
        🖥️ Open Dashboard
    </button>

    <!-- OPEN CANVA -->
    <button onclick="location.href='/api/canva/open/'">
        🎨 Open Canva
    </button>

</div>

</body>
</html>
