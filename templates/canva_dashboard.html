<!DOCTYPE html>
<html>
<head>
    <title>Canva Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 20px;
        }

        h1 { color: #333; }

        .container {
            background: white;
            padding: 20px;
            margin: auto;
            width: 85%;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .top-bar { margin-bottom: 20px; }

        button {
            padding: 10px 15px;
            border: none;
            background: #00c4cc;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover { background: #009aa3; }

        #designs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
        }

        .preview {
            width: 100%;
            height: 140px;
            border-radius: 6px;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 14px;
        }

        .preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge {
            margin-top: 5px;
            font-size: 12px;
            padding: 3px 7px;
            background: #00c4cc;
            color: white;
            border-radius: 4px;
            display: inline-block;
        }

        .status { margin: 10px 0; font-weight: bold; }
        .green { color: green; }
        .red { color: red; }
    </style>
</head>

<body>

<h1>🖥️ Canva Dashboard (All Formats)</h1>

<div class="container">

    <div class="top-bar">
        <button onclick="location.href='/'">🏠 Home</button>
        <button onclick="location.href='/api/canva/login/'">🔄 Reconnect</button>
        <button onclick="location.href='/api/canva/open/'">🎨 Open Canva</button>
    </div>

    <div class="status" id="status">Loading...</div>

    <div id="designs-grid">Loading designs...</div>

</div>

<script>

async function loadDashboard() {

    const res = await fetch('/api/canva/saved-designs/');
    const data = await res.json();

    const grid = document.getElementById("designs-grid");
    grid.innerHTML = "";

    const designs = data.designs || [];

    if (!designs.length) {
        grid.innerHTML = "<p>No designs found</p>";
        return;
    }

    designs.forEach(d => {

        const div = document.createElement("div");
        div.className = "card";

        let url = d.asset || "";
        let type = "EMPTY";

        if (url.includes(".pdf")) type = "PDF";
        else if (url.includes(".mp4")) type = "VIDEO";
        else if (url.includes(".svg")) type = "SVG";
        else if (url) type = "IMAGE";

        let preview = "";

        if (type === "IMAGE") {
            preview = `<img src="${url}" onerror="this.style.display='none'">`;
        }
        else if (type === "PDF") {
            preview = "📄 PDF File";
        }
        else if (type === "VIDEO") {
            preview = "🎬 Video File";
        }
        else if (type === "SVG") {
            preview = "🧩 SVG File";
        }
        else {
            preview = "❌ No Preview";
        }

        div.innerHTML = `
            <div class="preview">${preview}</div>
            <p><b>${d.title}</b></p>
            <small>${d.id}</small><br>
            <span class="badge">${type}</span>
        `;

        grid.appendChild(div);
    });

    document.getElementById("status").innerHTML =
        "✅ Loaded ALL file types from DB";

    document.getElementById("status").className = "status green";
}

loadDashboard();

</script>

</body>
</html>
